      level: 2
    image: {}
    text:
      format: 1
      content: >-
        <p><strong>Name</strong>: Give the behaviour a name so you know what
        it's doing (e.g. Show Cave Map Pin)</p><p
        class="MsoNormal"><strong>Behaviour Status</strong>: You can toggle the
        behaviour on/off (tick Disabled to turn the behaviour off</p><p
        class="MsoNormal"><strong>Mouse Button</strong>: Which mouse button
        triggers the behaviour (left or right)</p><p
        class="MsoNormal"><strong>Show</strong>: Does this behaviour show the
        Map Pin(ticked) or hide it (unticked)</p><p
        class="MsoNormal"><strong>Map Notes</strong>: Enter the UUID or drop the
        map notehere.</p><p class="MsoNormal"><strong>Select Documents</strong>:
        Enter the UUIDs or drag relevant Documents that you want made visible
        to/hidden from players here when the map note is shown/hidden.</p><p
        class="MsoNormal"><strong>Show Permission</strong>: Select the
        permission level you want granted to all players when this map note is
        shown. You may want Observer permissions granted when showing the
        note</p><p class="MsoNormal"><strong>Hide Permission</strong>: Select
        the permission level you want granted to all players when this map note
        is hidden. You want "None" when hiding the note.</p>
