  - sort: 200000
    name: 'CCI: Open Document'
    type: text
    _id: eK6nvn2IndkckRJK
    system: {}
    title:
      show: false
      level: 2
    image: {}
    text:
      format: 1
      content: >-
        <p><strong>Name</strong>: Give the behaviour a name so you know what
        it's doing (e.g. Open Archer Document)</p><p
        class="MsoNormal"><strong>Behaviour Status</strong>: You can toggle the
        behaviour on/off (tick Disabled to turn the behaviour off</p><p
        class="MsoNormal"><strong>Mouse Button</strong>: Which mouse button
        triggers the behaviour (left or right)</p><p
        class="MsoNormal"><strong>Can Click if</strong>: Who can trigger the
        behaviour - GM, Everyone (Always) or onlt those people who can See the
        Document</p><p class="MsoNormal"><strong>Select Document</strong>: Enter
        the UUID or drop the relevant document here. This can be an actor, item,
        journal, journal page etc</p><p class="MsoNormal"><strong>Optional
        Anchor</strong>: Enter the anchor reference if you want the document
        opened at that point. This is relevant to journals.</p>
    video:
      controls: true
      volume: 0.5
    src: null
    category: null
