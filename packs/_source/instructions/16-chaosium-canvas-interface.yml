name: 16) Chaosium Canvas Interface
_id: YIOXEE3VeZemUzVc
pages:
  - sort: 100000
    name: Chaosium Canvas Interface
    type: text
    _id: gBj2YxqJaneb1F9r
    system: {}
    title:
      show: false
      level: 1
    image: {}
    text:
      format: 1
      content: >-
        <p>What is the Chaosium Canvas Interface?<br /><br />The Chaosium Canvas
        Interface was designed for the Call of Cthulhu system, but thanks to
        James B (who created the CCI) it has been ported it over to Rivers of
        London. James has kindly simplified the user interface so it needs less
        technical know-how to set up the options, but it does mean it may be
        slightly more limiting than the Call of Cthulhu version.</p><p
        class="MsoNormal">In Foundry you can create map notes and tiles, and
        then control the some activities from the map notes, tile or region
        behaviour layers. This means the GM has to change from the normal
        "token" layer to these layers during gameplay. CCI lets you, with some
        setup, control tiles from the normal 'token' layer.</p><p
        class="MsoNormal">It also has some other functions that the inbuilt
        Foundry Behaviours layer doesn't have.<br /><br />The current options
        are:</p><ul style="margin-top:0cm"><li class="MsoNormal"
        style="mso-list:l0 level1 lfo1;tab-stops:list
        36.0pt"><p>@UUID[Compendium.Pendragon.instructions.JournalEntry.YIOXEE3VeZemUzVc.JournalEntryPage.eK6nvn2IndkckRJK]{CCI:
        Open Document}</p></li><li class="MsoNormal" style="mso-list:l0 level1
        lfo1;tab-stops:list
        36.0pt"><p>@UUID[Compendium.Pendragon.instructions.JournalEntry.YIOXEE3VeZemUzVc.JournalEntryPage.ObOSbX8C45S5H1rV]{CCI:
        Drawing Toggle}</p></li><li class="MsoNormal" style="mso-list:l0 level1
        lfo1;tab-stops:list
        36.0pt"><p>@UUID[Compendium.Pendragon.instructions.JournalEntry.YIOXEE3VeZemUzVc.JournalEntryPage.dHWBhwsRzdDuc2N8]{CCI:
        Map Pin Toggle}</p></li><li class="MsoNormal" style="mso-list:l0 level1
        lfo1;tab-stops:list
        36.0pt"><p>@UUID[Compendium.Pendragon.instructions.JournalEntry.YIOXEE3VeZemUzVc.JournalEntryPage.47TGEJqzg1JbeUip]{CCI:
        Tile Toggle}</p></li><li class="MsoNormal" style="mso-list:l0 level1
        lfo1;tab-stops:list
        36.0pt"><p>@UUID[Compendium.Pendragon.instructions.JournalEntry.YIOXEE3VeZemUzVc.JournalEntryPage.xQuMWZdTuze0V2sh]{CCI:
        Play Sound}</p></li><li class="MsoNormal" style="mso-list:l0 level1
        lfo1;tab-stops:list
        36.0pt"><p>@UUID[Compendium.Pendragon.instructions.JournalEntry.YIOXEE3VeZemUzVc.JournalEntryPage.ZUyOPBM4Ntq4xdE2]{CCI:
        To Scene}</p></li></ul><p class="MsoNormal">When setting up regions it
        is often useful to have some extra tiles set up - for example a red eye
        tile and a green eye tile plus say the picture of a statue. Set a
        behaviour on the red eye tile to make the statue tile invisible (hidden)
        to everyone, and the green eye tile makes it visible (shown) to
        everyone. The statue can then have its own behaviour to open a journal
        document to explain it to the players.</p>
