  - sort: 300000
    name: 'CCI: Drawing Toggle'
    type: text
    _id: ObOSbX8C45S5H1rV
    system: {}
    title:
      show: false
      level: 2
    image: {}
    text:
      format: 1
      content: "<p><strong>Name</strong>: Give the behaviour a name so you know what it's doing (e.g. Show Archer Drawing)</p><p class=\"MsoNormal\"><strong>Behaviour Status</strong>: You can toggle the behaviour on/off (tick Disabled to turn the behaviour off</p><p class=\"MsoNormal\"><strong>Mouse Button</strong>: Which mouse button triggers the behaviour (left or right)</p><p class=\"MsoNormal\"><strong>Show</strong>: Does this behaviour show the drawing (ticked) or hide it (unticked)</p><p class=\"MsoNormal\"><strong>Select Drawing</strong>: Enter the UUID or drop the relevant drawing here.</p><p class=\"MsoNormal\"><strong>Select Journal Entries:</strong>\_Enter the UUIDs or drag relevant Journals that you want made visible to players here.</p><p class=\"MsoNormal\"><strong>Permission for Journal Entries</strong>: Select the permission level you want granted to\_<strong>all</strong>\_players when a show behaviour is triggered.\_</p><p class=\"MsoNormal\"><strong>Hide Permission for Journal Entries</strong>: Select the permission level you want granted to\_<strong>all</strong>\_players when a hide behaviour is triggered.\_<strong>Select Journal Entry Pages:</strong>\_Enter the UUIDs or drag relevant Journals Pages that you want made visible to players here.</p><p class=\"MsoNormal\"><strong>Select Journal Entries:</strong>\_Enter the UUIDs or drag relevant Journals Pagers that you want made visible to/hidden from players here.</p><p class=\"MsoNormal\"><strong>Permission for Journal Entry Pages</strong>: Select the permission level you want granted to\_<strong>all</strong>\_players when a show behaviour is triggered.\_</p><p class=\"MsoNormal\"><strong>Hide Permission for Journal Entry Pages</strong>: Select the permission level you want granted to\_<strong>all</strong>\_players when a hide behaviour is triggered.\_</p><p class=\"MsoNormal\"><strong>Select Region Behaviours</strong>: Enter the UUIDs or Drop Region Behaviours here to enable or disable them.</p><p class=\"MsoNormal\"><strong>Trigger Region Button:</strong>\_If the main Mouse Button was \"Both\" choose which button triggers any follow on behaviours.\_\_</p><p class=\"MsoNormal\"><strong>Trigger This Region</strong>:\_ Add the UUID, or drag the behaviour, that you want triggered as part of this action.</p><p class=\"MsoNormal\"><strong>With a Button Click:</strong>\_ Select the mouse button you want the follow on behaviour to be triggered with (e.g. Open a Document as is the left mouse button had been clicked)</p>"
