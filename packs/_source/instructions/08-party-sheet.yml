    text:
      format: 1
      content: >-
        <p>The Party is a type of Actor.</p><p>The GM can add (drag and drop) or
        remove (trashcan icon) characters to the party.  You can not add other
        actor types or items.</p><p></p><p>For each character added you will
        see:</p><ul><li><p>Their name</p></li><li><p>The portrait image. 
        Clicking on this opens the character sheet if the person has the
        appropriate permissions.</p></li><li><p>A bar show the percentage of max
        HP they currently have (full bar = 100%)</p></li><li><p>The values of
        current and maximum HP</p></li><li><p>A list of traits, passions and
        skills that have a score of 16+ as a quick summary of what the character
        is famous for</p></li></ul><p>By default all players can view the party
        sheet,</p><p>There is a game setting
        @UUID[Compendium.Pendragon.instructions.JournalEntry.7U9pKyQCsPrhgwnl.JournalEntryPage.BGPNYU1lP7NF3mmV]{Show
        Party Details} so that players can not see the information in the last
        two  bullets.</p>
