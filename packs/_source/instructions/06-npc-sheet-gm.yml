    text:
      format: 1
      content: >-
        <p>This is a cut-down character sheet but operates in the same way as a
        character sheet for the most part.</p><p>There are several icons at the
        top right of the screen (just to the right of the NPC portrait
        image).</p><p>The padlock icon - toggling it with Double Click makes
        more of the sheet editable and adds View/Delete icons (these are hidden
        when locked to give a cleaner appearance).<br /></p><p>The scroll icon -
        this will show/hide the Notes section of the NPC. The aim here is to
        keep the NPC sheet small as you don't always need to see notes, but this
        way you can make them visible when needed/</p><p><br />The dice icon is
        only visible when the NPC sheet is unlocked. When this is double clicked
        the NPCs scores (e.g. Max HP, Knockdown) etc will be automatically
        derived from the stats. You can then edit any or all of the values to
        override the calculated score whils the sheet is unlocked. You can
        double click the dice icon to return <strong>ALL</strong> these scores
        to the calculated defaults,</p><p>You <strong>can not</strong> make dice
        rolls whilst the NPC sheet is unlocked</p><p>The user (person) icon lets
        you toggle the main part of the sheet between "Actual Stats" which shows
        HP, skill etc and "Base Stats".</p><p>The dice icon lets you
        calculate/recalculate derived stats.  This will overwrite any
        adjustments you've made (see below)</p><p>The scroll icon will show/hide
        the NPC notes section.</p><p><strong>Actual Stats</strong></p><p>Some
        differences from the Actor Sheet to note:</p><ul><li><p>When unlocked
        you can enter various Derived Stats values - these will take precedence
        over the calculated values</p></li><li><p>There is a Glory Award entry
        for you to record how much is granted to the
        characters</p></li><li><p>There is a Glory Total entry to record the
        NPCs glory.  You can make a Glory Roll from here.</p></li><li><p>There
        is a valorous modifier - to record an adjustment that a character would
        need to apply when making a valorous roll</p></li><li><p>You can enter
        an alternative movement mode (Alt Move) and a suitable
        value</p></li><li><p>You can also enter a Ransom and Knight Value for
        the NPC</p></li><li><p>Some of the entries above will be hidden when the
        NPC sheet is locked if there is a 0 value or no entry made.  This is to
        reduce the size of the sheet.</p></li><li><p>Rather than a list of
        wounds there is one Wound Stat that should simply be updated. Major
        Wound statuses are not shown - you should track this
        accordingly.</p></li><li><p>Whilst weapons etc can be dragged to the
        character sheet they can be added manually with the "+" icon to allow
        you to add one off or bespoke skills, weapons etc.</p></li><li><p>Weapon
        score and Damage should be added manually - they are not derived from
        the interaction of skills and weapon. This is to allow for the potential
        in the future to import NPCs from blocks of text</p></li><li><p>Armour
        has an "Arm" toggle box. Toggle this on for armour and off for Shields.
        Remember you can override the armour values manually when the NPC sheet
        is unlocked.</p></li><li><p>Traits only show and roll the main trait
        (not the opposed trait). If you need this for an NPC add a new trait
        using the Opposed details.</p></li><li><p>Magical Talents show skills
        that have the "Magical Talent" tickbox checked.</p></li><li><p>Each
        section (skills, weapons etc) can be exapnded/shrunk by clicking the
        Up/Down icons at the right side of each section. This is only available
        when the NPC sheet is locked. When the sheet is locked only sections
        that have items in them are visible.</p></li><li><p>When the NPC sheet
        is unlocked all sections are visible and are
        expanded.</p></li></ul><p>When creating a token for an NPC there are two
        attributes shown on the icon. The top attribute is the "Total Wounds"
        and can be updated on the token. The bottom number is the Current HP and
        can't be edited. Changing the "Total Wounds" updates the Current HP and
        the health bar.</p><p></p><p><strong>Base Stats</strong></p><p>You can
        enter formulae for the stats (e.g. 2D6+4) to randomly roll the stats.
        See
        @UUID[Compendium.Pendragon.instructions.JournalEntry.7U9pKyQCsPrhgwnl.JournalEntryPage.EG80uuwz8hOXkuUN]{When
        Creating NPC (GM)} for more information on setting
        defaults.</p><p></p><p>In addition if you add a skill, trait or passion
        that is already on the NPC sheet you can enter a roll formula to
        determine the starting value (e.g. If Honor is already on the sheet and
        you add it a second time you could enter 1D6+10 so that if you chose to
        use the random values the starting value will be overriden with this
        dice roll).  <br /><br />These variable/random skills etc are list on
        the Base Stats section under "Variable Skills etc". The GM can delete
        them. To change the value you will need to delete and then add the skill
        etc again, entering the new value.</p>
