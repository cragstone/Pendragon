    title:
      show: true
      level: 2
    image: {}
    text:
      format: 1
      content: "<p>Irrespective of whether you chose Random\_or Constructed\_you now pick your Homeland. This is drawn up from all the homelands in the World or the Compendia.</p><p>If your homeland gives a passion bonus this will be updated.</p><p><br /></p><p>You can now move on to @UUID[Compendium.Pendragon.instructions.JournalEntry.6oeGiTDZUL8cyL0t.JournalEntryPage.ylFja4eKNjdFXcUS]{Character Name}</p>"
