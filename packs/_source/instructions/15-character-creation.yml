  - sort: 1350000
    name: Family Characteristic
    type: text
    _id: 6vUO48KUpXYO8Jey
    title:
      show: true
      level: 2
    image: {}
    text:
      format: 1
      content: "<p>Again what happens next depends on what you selected in the @UUID[.mW0ixUw2wxOyHzq1] step.</p><p>If you chose <strong>Random </strong>then your family characteristic is selected randomly from the Family Characteristic table.\_ The table includes \"Gifted\".\_ A chat message is produced from the roll.</p><p>If you chose <strong>Constructed</strong> then you are presented with a list of the items on the Family Characteristic table except for \"Gifted\".</p><p>The family characteristic is added to your @UUID[Compendium.Pendragon.instructions.JournalEntry.b5d7Ha8LOeLSNvul.JournalEntryPage.jLkjoTOmE5GIIuJW]{Bio Tab} and the relevant skills are updated.</p><p><br /></p><p>You can now move on to @UUID[Compendium.Pendragon.instructions.JournalEntry.6oeGiTDZUL8cyL0t.JournalEntryPage.f1Krzt3KUJAafeck]{Skill Points}.</p><p><br class=\"Apple-interchange-newline\" /></p>"
    video:
      controls: true
      volume: 0.5
    src: null
    system: {}
    ownership:
      default: -1
    flags: {}
