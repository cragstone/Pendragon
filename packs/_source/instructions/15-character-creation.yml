  - sort: 1775000
    name: Class
    type: text
    _id: I2CVPKCMX2e5mMJN
    system: {}
    title:
      show: true
      level: 2
    image: {}
    text:
      format: 1
      content: >-
        <p>This is an optional step. If your character is starting as a squire
        then skip this step.</p><p><br></p><p>You will be presented with a list
        of "non-starter" classes to choose from.  Your old class will be removed
        and the new class added.  Passion scores are not changed except if you
        select Mercenary Knight, any points spent on Homage (Liege) are moved to
        Fealty (Liege). </p><p><br></p><p>Starting equipment is not added at
        this stage.</p><p><br></p><p>Please note that resetting this step will
        also reset the Passions.  <br></p><p>You can now move on to
        @UUID[Compendium.Pendragon.instructions.JournalEntry.6oeGiTDZUL8cyL0t.JournalEntryPage.HnijTDYLb3oC6DDO]{Parents}.</p>
    video:
      controls: true
