      exportSource: null
    category: null
    _key: '!journal.pages!6oeGiTDZUL8cyL0t.f1Krzt3KUJAafeck'
  - sort: 1700000
    name: Training & Practice
    type: text
    _id: wRZE8vjs0I1alQ0U
    title:
      show: true
      level: 2
    image: {}
    text:
      format: 1
      content: >-
        <p>For each year of training you can select one of the
        following</p><ul><li><p>Increase skills - you can spend 5 points on
        skills</p></li><li><p>Adjust traits - you can increase or decrease a
        trait by one point</p></li><li><p>Increase passions - you can increase a
        passion by one point</p></li><li><p>Increase characteristics - you can
        increase a characteristic by one point</p></li></ul><p><br></p><p>Each
        year of training is done separately and any skills etc that have the
        maximum will no longer be shown.</p><p>This step also creates a History
        item for your character's birth</p><p><br></p><p>You can now move on to
        @UUID[Compendium.Pendragon.instructions.JournalEntry.6oeGiTDZUL8cyL0t.JournalEntryPage.z8amvqVh5hnxy4L0]{Knighted}</p>
    video:
      controls: true
      volume: 0.5
    src: null
    system: {}
    ownership:
      default: -1
    flags: {}
    _stats:
      duplicateSource: null
      coreVersion: '14.364'
      systemId: Pendragon
      systemVersion: 12.1.16
      createdTime: 1781499249044
      modifiedTime: 1781499249044
      lastModifiedBy: pendragonBuilder
      exportSource: null
    category: null
    _key: '!journal.pages!6oeGiTDZUL8cyL0t.wRZE8vjs0I1alQ0U'
  - sort: 1800000
    name: Luck Benefit
    type: text
    _id: kjijql0kDg5a2n7t
    title:
      show: true
      level: 2
    image: {}
    text:
      format: 1
      content: >-
        <p>You will first be asked if you are eligible for a Luck Benefit -
        discuss this with your GM.</p><p><br></p><p>If you answered yes you will
        then roll on the "Luck Benefits table" with a chat message showing the
        result.</p><p><br></p><p>The relevant item will be added to your
        @UUID[Compendium.Pendragon.instructions.JournalEntry.b5d7Ha8LOeLSNvul.JournalEntryPage.TK3AJJwLFtTGA2mH]{Equip
        Tab} but any permanent effects will need to be adjusted manually (e.g.
        add a Sword with +1 damage).</p><p><br></p><p>Congratulations, you have
        now completed the character creation wizard.</p><p><br></p><p>You can
        now move on to some
        @UUID[Compendium.Pendragon.instructions.JournalEntry.6oeGiTDZUL8cyL0t.JournalEntryPage.El5zG1GSjRQQvT8C]{Tidying
        Up} steps.</p>
    video:
      controls: true
      volume: 0.5
    src: null
    system: {}
    ownership:
      default: -1
    flags: {}
    _stats:
      duplicateSource: null
      coreVersion: '14.364'
