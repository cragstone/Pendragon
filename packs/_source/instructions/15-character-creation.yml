    _id: ylFja4eKNjdFXcUS
    system: {}
    title:
      show: true
      level: 2
    image: {}
    text:
      format: 1
      content: >-
        <p>Clicking on the activate icon will open a dialog box where you can
        enter the character name. Adding the name this way will also update the
        character's PID .</p><p>If you already added a name (either at creation
        or directly in the character sheet) this step will already shown as
        completed.</p><p><br></p><p>You can now move on to
        @UUID[Compendium.Pendragon.instructions.JournalEntry.6oeGiTDZUL8cyL0t.JournalEntryPage.sH6kXnIUH2NBX3ox]{Character
        Gender}.</p><p><br></p>
