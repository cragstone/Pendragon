      content: >-
        <p>This step opens another free text dialog box where you can enter the
        location of your current home/residence.</p><p><br /></p><p>You can now
        move on to
        @UUID[Compendium.Pendragon.instructions.JournalEntry.6oeGiTDZUL8cyL0t.JournalEntryPage.tqwKyfDuiBYKRj9C]{Characteristics}.</p>
