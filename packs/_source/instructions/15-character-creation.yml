    _key: '!journal.pages!6oeGiTDZUL8cyL0t.6vUO48KUpXYO8Jey'
  - sort: 1600000
    name: Skill Points
    type: text
    _id: f1Krzt3KUJAafeck
    title:
      show: true
      level: 2
    image: {}
    text:
      format: 1
      content: >-
        <p>This step is the same whether you chose <strong>Random </strong>or
        <strong>Constructed </strong>at the start.</p><p><br></p><p>You have 10
        points to spend on your skills. Use the dialog box to spend the points.
        These will update the Training part of your skill
        scores.</p><p><br></p><p>You can now move on to
        @UUID[Compendium.Pendragon.instructions.JournalEntry.6oeGiTDZUL8cyL0t.JournalEntryPage.wRZE8vjs0I1alQ0U]{Training
        &amp; Practice}</p>
    video:
      controls: true
      volume: 0.5
    src: null
    system: {}
    ownership:
      default: -1
    flags: {}
    _stats:
      duplicateSource: null
      coreVersion: '14.364'
      systemId: Pendragon
      systemVersion: 12.1.16
