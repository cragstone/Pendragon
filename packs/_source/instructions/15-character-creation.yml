  - sort: 400000
    name: Character Creation Wizard
    type: text
    _id: T83N26BqSr7jw5Na
    title:
      show: true
      level: 1
    image: {}
    text:
      format: 1
      content: >-
        <p>In this method you will be guided through the character creation
        method with much of it automated for you.</p><p>For the wizard to run
        there needs to be several tables set up with the correct
        @UUID[Compendium.Pendragon.instructions.JournalEntry.gOCGw5hx6CoGK3h1.JournalEntryPage.9XSOOqLUjc6FpTzQ]{PIDs}.</p><p>If
        you have the <em>Pendragon Core Rulebook</em> module from Foundry these
        are included.</p><p><strong>If you don't have the module you will
        need:</strong></p><table><tbody><tr
        style="box-sizing:border-box;user-select:text"><td data-colwidth="237"
        style="box-sizing:border-box;user-select:text;padding:0.25em 0px 0.25em
        2px"><p style="box-sizing:border-box;user-select:text;margin:0.5em
        0px;text-align:center"><span style="font-family:Roboto,
        sans-serif"><strong
        style="box-sizing:border-box;user-select:text">PID</strong></span></p></td><td
        style="box-sizing:border-box;user-select:text;padding:0.25em 0px"><p
        style="box-sizing:border-box;user-select:text;margin:0.5em
        0px;text-align:center"><span style="font-family:Roboto,
        sans-serif"><strong
        style="box-sizing:border-box;user-select:text">Table</strong></span></p></td></tr><tr
        style="box-sizing:border-box;user-select:text;background-color:rgba(255,
        255, 255, 0.2)"><td data-colwidth="237"
        style="box-sizing:border-box;user-select:text;padding:0.25em 0px 0.25em
        2px"><p style="box-sizing:border-box;user-select:text;margin:0.5em
        0px;text-align:center"><span style="font-family:Roboto,
        sans-serif">rt..religion</span></p></td><td
        style="box-sizing:border-box;user-select:text;padding:0.25em 0px"><p
        style="box-sizing:border-box;user-select:text;margin:0.5em
        0px;text-align:center"><span style="font-family:Roboto,
        sans-serif">Religion table used in character
        generation</span></p></td></tr><tr
        style="box-sizing:border-box;user-select:text"><td data-colwidth="237"
        style="box-sizing:border-box;user-select:text;padding:0.25em 0px 0.25em
        2px"><p style="box-sizing:border-box;user-select:text;margin:0.5em
        0px;text-align:center"><span style="font-family:Roboto,
        sans-serif">rt..family-characteristic</span></p></td><td
        style="box-sizing:border-box;user-select:text;padding:0.25em 0px"><p
        style="box-sizing:border-box;user-select:text;margin:0.5em
        0px;text-align:center"><span style="font-family:Roboto,
        sans-serif">Family characteristic table used in character
        generation</span></p></td></tr><tr><td data-colwidth="237"
        style="box-sizing:border-box;user-select:text;padding:0.25em 0px 0.25em
        2px"><p style="box-sizing:border-box;user-select:text;margin:0.5em
        0px;text-align:center"><span style="font-family:Roboto,
        sans-serif">rt..table-3-1-heroic-event</span></p></td><td
        style="box-sizing:border-box;user-select:text;padding:0.25em 0px"><p
        style="box-sizing:border-box;user-select:text;margin:0.5em
        0px;text-align:center"><span style="font-family:Roboto,
        sans-serif">Heroic Events table used in character
        generation</span></p></td></tr><tr
        style="box-sizing:border-box;user-select:text;background-color:rgba(255,
        255, 255, 0.2)"><td data-colwidth="237"
        style="box-sizing:border-box;user-select:text;padding:0.25em 0px 0.25em
        2px"><p style="box-sizing:border-box;user-select:text;margin:0.5em
        0px;text-align:center"><span style="font-family:Roboto,
        sans-serif">rt..luck-benefits</span></p></td><td
        style="box-sizing:border-box;user-select:text;padding:0.25em 0px"><p
        style="box-sizing:border-box;user-select:text;margin:0.5em
        0px;text-align:center"><span style="font-family:Roboto, sans-serif">Luck
        benefits table used in character generations</span></p></td></tr><tr
        style="box-sizing:border-box;user-select:text"><td data-colwidth="237"
        style="box-sizing:border-box;user-select:text;padding:0.25em 0px 0.25em
        2px"><p style="box-sizing:border-box;user-select:text;margin:0.5em
        0px;text-align:center"><span style="font-family:Roboto,
        sans-serif">rt..blessed-birth</span></p></td><td
        style="box-sizing:border-box;user-select:text;padding:0.25em 0px"><p
        style="box-sizing:border-box;user-select:text;margin:0.5em
        0px;text-align:center"><span style="font-family:Roboto,
        sans-serif">Blessed Birth tables used in Winter
        Phase</span></p></td></tr></tbody></table><ul><li><p>You will need to
        create one or more Class Items - add the passions listed in the the
        first paragraph of the 'random' method on Pg 51 of the <em>Pendragon
        Core Rulebook </em>to the relevant section. Passions shown as 2D6+8 are
        Primary, 2D6+3 are Secondary and 1D6+3 are Tertiary. Create the
        Equipment Items listed on Page 55 and of <em>Pendragon Core
        Rulebook</em> under Starting Equipment for Squires, and add them to the
        Class Item/</p></li><li><p>Create the Homeland Item - add the passion
        listed in Page 51 of the <em>Pendragon Core
        Rulebook.</em></p></li><li><p>Create the Culture Item - add the relevant
        characteristics from Page 46 of the <em>Pendragon Core Rulebook</em>
        drag the skills listed under Cultural Skill modifiers on Page 52 on to
        the item.</p></li></ul><p><strong>Once you have all the items and tables
        either by setting them up or from the Core Rulebook
        module</strong></p><ul><li><p>Ask the GM to turn
        @UUID[Compendium.Pendragon.instructions.JournalEntry.CJhCwQigLrJhBBQF.JournalEntryPage.OmYmAHWltBg0sVQO]{Character
        Creation mode} on</p></li><li><p>Ask the GM to create a new actor in
        Foundry and choose 'Character' as the type and assign ownership to
        you</p></li><li><p>You should see a new tab on the character sheet
        called "Create".  The tab lists the steps and it's recommended that you
        follow them in order.</p></li><li><p>For each step you will see the step
        name, a number of icons and a note</p></li><li><p>The status icon is
        either a Green Shield (step completed) or a Green Shield (step
        incomplete)</p></li><li><p>The Activate icon will either be red (press
        it to activate the step) or grey (you can't activate
        it)</p></li><li><p>The reset icon will be black if you have completed
        the step, or grey if it's not yet been completed.  You can double click
        the black broom icon to reset the step</p></li><li><p>Notes - there are
        some notes shown indicating if a step is optional, or to show the result
        of the step.</p></li><li><p>The Knighthood step may not show any icons -
        this means your character doesn't meet the requirements of being
        knighted (yet).</p></li><li><p>The extra icon of the Creation Method
        step is just a warning (details in tooltip) that resetting this step
        will reset some others.</p></li><li><p>The individual steps are set out
        in the following pages</p><p><br></p></li></ul>
    video:
      controls: true
      volume: 0.5
    src: null
    system: {}
    ownership:
      default: -1
    flags: {}
    _stats:
      duplicateSource: null
      coreVersion: '14.364'
      systemId: Pendragon
      systemVersion: 12.1.16
      createdTime: 1781499248982
      modifiedTime: 1781499248982
      lastModifiedBy: pendragonBuilder
      exportSource: null
