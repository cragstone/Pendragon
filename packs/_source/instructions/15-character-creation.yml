  - sort: 1750000
    name: Knighted
    type: text
    _id: z8amvqVh5hnxy4L0
    title:
      show: true
      level: 2
    image: {}
    text:
      format: 1
      content: >-
        <p>This is an Optional step. If your character is to start as a squire
        then skip this step.</p><p><br></p><p>First, confirm that you are ready
        to be Knighted. If you don't have the requisite skills then the icons
        for this step will not be visible on the "Create" tab and there will be
        a note to show this.</p><p><br></p><p>If you can proceed then you will
        get a dialog box where you enter the amount of your Lord's
        glory.</p><p><br></p><p>After this a DEX roll is made for you for "the
        leap".</p><p><br></p><p>A history item is created and added to your
        character.</p><p><br></p><p>You are now ready to move on to
        @UUID[Compendium.Pendragon.instructions.JournalEntry.6oeGiTDZUL8cyL0t.JournalEntryPage.I2CVPKCMX2e5mMJN]{Class}</p><p><br></p>
    video:
      controls: true
      volume: 0.5
    src: null
    system: {}
    ownership:
      default: -1
    flags: {}
    _stats:
      duplicateSource: null
      coreVersion: '14.364'
      systemId: Pendragon
      systemVersion: 12.1.16
      createdTime: 1781499249064
      modifiedTime: 1781499249064
      lastModifiedBy: pendragonBuilder
      exportSource: null
    category: null
    _key: '!journal.pages!6oeGiTDZUL8cyL0t.z8amvqVh5hnxy4L0'
  - sort: 2000000
    name: Tidy Up
    type: text
    _id: El5zG1GSjRQQvT8C
    title:
      show: true
      level: 2
    image: {}
    text:
      format: 1
      content: >-
        <p>Although the character wizard has completed there are a few things
        you may want to tidy up</p><ul><li><p>You may have had multiple spears
        added on the
        @UUID[Compendium.Pendragon.instructions.JournalEntry.b5d7Ha8LOeLSNvul.JournalEntryPage.0YxsvVe0d1sSzu6F]{Combat
        Tab}. Change the quantity on the first item and delete the
        duplicates</p></li><li><p>Because all Passions in the game were added
        you may have several with a zero score on the
        @UUID[Compendium.Pendragon.instructions.JournalEntry.b5d7Ha8LOeLSNvul.JournalEntryPage.dY9bwgsZV3XBq1Le]{Passions
        Tab}. Delete any you don't want to keep (you can always add them back
        later).  When the character sheet is locked any Passions with a zero
        score are hidden.</p></li><li><p>You will probably have some Armour on
        the
        @UUID[Compendium.Pendragon.instructions.JournalEntry.b5d7Ha8LOeLSNvul.JournalEntryPage.TK3AJJwLFtTGA2mH]{Equip
        Tab}. Make sure you've equipped those you want to
        use.</p></li><li><p>You'll also likely have some horses on the
        @UUID[Compendium.Pendragon.instructions.JournalEntry.b5d7Ha8LOeLSNvul.JournalEntryPage.sEG9oOq3L4kqF5uB]{Squires
        Tab}. You may want to select one as "Ridden"</p></li><li><p>On the same
        tab you may want to add a squire.</p></li><li><p>Amend any History
        Events on the
        @UUID[Compendium.Pendragon.instructions.JournalEntry.b5d7Ha8LOeLSNvul.JournalEntryPage.8390AvE66aRvM5fJ]{Events
        Tab} especially the "Heroic Event" items adding more
        details.</p></li><li><p>On the
        @UUID[Compendium.Pendragon.instructions.JournalEntry.b5d7Ha8LOeLSNvul.JournalEntryPage.jLkjoTOmE5GIIuJW]{Bio
        Tab} you may want to add , a Motto and your Heraldic device. You will
        also want to give some more detail about your distinctive features. And
        any other background you want.</p></li><li><p>Add a character
        image.</p></li><li><p>Ensure the character sheet is
        locked.</p></li></ul><p>You're now ready to go.</p>
    video:
      controls: true
      volume: 0.5
    src: null
    system: {}
    ownership:
      default: -1
