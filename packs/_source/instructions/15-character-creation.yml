  - sort: 1300000
    name: Parent Passion
    type: text
    _id: QEBfDMd7Zjx34BlL
    title:
      show: true
      level: 2
    image: {}
    text:
      format: 1
      content: >-
        <p>You get the option to add a parental passion or select
        "none".</p><p>If you select a parental passion you will be asked for the
        parents score and ( if appropriate) your passion score will be
        increased.</p><p><br /></p><p>You can now move on to
        @UUID[Compendium.Pendragon.instructions.JournalEntry.6oeGiTDZUL8cyL0t.JournalEntryPage.6vUO48KUpXYO8Jey]{Family
        Characteristic}.</p>
    video:
