  - sort: 200000
    name: Manual Method
    type: text
    _id: I3Tr0BSAlnHvBWE5
    title:
      show: true
      level: 1
    image: {}
    text:
      format: 1
      content: >-
        <p>In this method you will edit everything manually.</p><ul><li><p>Ask
        the GM to turn
        @UUID[Compendium.Pendragon.instructions.JournalEntry.CJhCwQigLrJhBBQF.JournalEntryPage.OmYmAHWltBg0sVQO]{Character
        Creation} mode on</p></li><li><p>Ask the GM to create a new actor in
        Foundry and choose 'Character' as the type and assign ownership to
        you</p></li><li><p>You can enter your characteristics or roll them on
        the
        @UUID[Compendium.Pendragon.instructions.JournalEntry.b5d7Ha8LOeLSNvul.JournalEntryPage.qLYS7miTa5T31GYn]{Stats
        Tab}.  The red dice to the right of the stats tab will roll the stats
        for you and produce a chat message.  The dice icon will turn grey - if
        your GM clicks the grey dice icon it will reset to red letting a player
        re-roll their stats.</p></li><li><p>Creating the character will
        automatically add Skills, Traits and Passions to the character
        sheet</p></li><li><p>Unlock the character sheet</p></li><li><p>Follow
        the character creation method from the Players Guide going to the
        appropriate tabs to enter the stats.</p></li><li><p>On the Skills tab
        there are two arrows forming a circle to the right of the skills list. 
        Clicking on this will calculate the character base skill
        scores.</p></li><li><p>You will need to enter stats, bonuses and the
        like yourself in the relevant tabs</p></li><li><p>You will also have to
        add squires, family, equipment and History events.</p></li><li><p>Use
        the steps listed on the "Create" tab of the character sheet as a
        reminder of what you need to do.</p></li></ul>
      markdown: ''
    video:
      controls: true
      volume: 0.5
    src: null
