name: 15) Character Creation
_id: 6oeGiTDZUL8cyL0t
pages:
  - sort: 100000
    name: Creation Methods
    type: text
    _id: D2zwz3NcY2ih4HhP
    title:
      show: true
      level: 1
    image: {}
    text:
      format: 1
      content: >-
        <p>There are three ways to create a character which you can for the most
        part, mix and match
        from.</p><p><br></p><p>@UUID[.I3Tr0BSAlnHvBWE5]</p><p>@UUID[.f6IHJxAmKbOjzRJz]</p><p>@UUID[.T83N26BqSr7jw5Na]</p><p><br></p><p>Whilst
        in
        @UUID[Compendium.Pendragon.instructions.JournalEntry.CJhCwQigLrJhBBQF.JournalEntryPage.OmYmAHWltBg0sVQO]{Creation
        Mode} your Traits, Passions and Skills tabs will show a list of the
        various items with the base and other scores which you can
        edit.</p><p>The skill tabs has a "recalculate" button at the top right
        which will recalculate the base scores and the traits tab has a dice
        icon to re-roll the starting scores.</p>
    video:
      controls: true
      volume: 0.5
