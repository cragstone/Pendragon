      show: true
      level: 2
    image: {}
    text:
      format: 1
      content: >-
        <p>You will be presented with a dialog box where you can say if you are
        the family Heir or not.</p><p><br /></p><p>You can now move on to
        @UUID[Compendium.Pendragon.instructions.JournalEntry.6oeGiTDZUL8cyL0t.JournalEntryPage.sfeDbGZ24SVbvrOJ]{Starting
        Equipment}.</p>
