  - sort: 300000
    name: Semi Automated
    type: text
    _id: f6IHJxAmKbOjzRJz
    title:
      show: true
      level: 1
    image: {}
    text:
      format: 1
      content: "<p>In this method you will edit some things manually.</p><ul style=\"box-sizing:border-box;user-select:text;margin:0.5em 0px;padding:0px 0px 0px 1.5em\"><li><p>Ask the GM to turn @UUID[Compendium.Pendragon.instructions.JournalEntry.CJhCwQigLrJhBBQF.JournalEntryPage.OmYmAHWltBg0sVQO]{Character Creation} mode on</p></li><li><p>Ask the GM to create a new actor in Foundry and choose 'Character' as the type and assign ownership to you</p></li><li><p>Choose your Culture, Class, Homeland and Religion, dragging the relevant items to your character sheet.</p></li><li><p>Go to the\_@UUID[Compendium.Pendragon.instructions.JournalEntry.b5d7Ha8LOeLSNvul.JournalEntryPage.qLYS7miTa5T31GYn]{Stats Tab} and either select your stats values or roll them.</p></li><li><p>Whilst some equipment and bonuses are added you may need to review these and make any manual adjustments as you go</p></li><li><p>You will also have to add History events.</p></li></ul>"
    video:
      controls: true
      volume: 0.5
    src: null
    system: {}
    ownership:
      default: -1
    flags: {}
    _stats:
      duplicateSource: null
      coreVersion: '13.351'
      systemId: Pendragon
      systemVersion: 12.1.16
      createdTime: null
      modifiedTime: 1776000096978
