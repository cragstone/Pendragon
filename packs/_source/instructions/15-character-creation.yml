    _key: '!journal.pages!6oeGiTDZUL8cyL0t.T83N26BqSr7jw5Na'
  - sort: 500000
    name: Creation Method
    type: text
    _id: mW0ixUw2wxOyHzq1
    title:
      show: true
      level: 2
    image: {}
    text:
      format: 1
      content: >-
        <p><strong>Creation Method</strong></p><p>The first step in the wizard
        is to choose the "Random" or "Constructed" option. They both do what
        their name suggests</p><p><strong>Random</strong> means you roll for
        things like some starting values or
        religion</p><p><strong>Select</strong> means you get to pick more
        things</p><p>That doesn't mean everything is rolled or selected, there
        are always some instance where you have to do the opposite.</p><p>Click
        the relevant button to choose your option.</p><p><br></p><p>Please note
        that resetting this step will also reset the Religion, Characterstics,
        Traits, Passions and Family Characteristic steps.</p><p><br></p><p>You
        can now move on to
        @UUID[Compendium.Pendragon.instructions.JournalEntry.6oeGiTDZUL8cyL0t.JournalEntryPage.xZ8SozzjMIJHKhlu]{Culture}</p>
    video:
      controls: true
      volume: 0.5
    src: null
    system: {}
    ownership:
      default: -1
    flags: {}
    _stats:
      duplicateSource: null
      coreVersion: '14.364'
      systemId: Pendragon
      systemVersion: 12.1.16
      createdTime: 1781499248987
      modifiedTime: 1781499248987
      lastModifiedBy: pendragonBuilder
      exportSource: null
    category: null
    _key: '!journal.pages!6oeGiTDZUL8cyL0t.mW0ixUw2wxOyHzq1'
  - sort: 1787500
    name: Parents
    type: text
    _id: HnijTDYLb3oC6DDO
    title:
      show: true
      level: 2
    image: {}
    text:
      format: 1
      content: >-
        <p>You'll be given a dialog box to enter details about your
        parents.</p><p><br></p><p>Ticking the knight box generates "Glory" for
        them which in turn determines your starting Glory (its based off the
        best of the two rolls). The glory rolls will be shown in a chat message
        (one for each parent if they were knights)</p><p><br></p><p>You don't
        have to enter one or both parents - leave the relevant "Name" field
        blank.</p><p><br></p><p>One you've clicked the "Add Parents" button you
        will now have them added to your Family
        (@UUID[Compendium.Pendragon.instructions.JournalEntry.b5d7Ha8LOeLSNvul.JournalEntryPage.fRLDTfqAgmiltXyr]{House
        Tab}) with the "Parent" type.</p><p><br></p><p>You will also have
        History Events added - one for becoming a squire with the requisite
        glory reward and then some "Heroic Events". If you have the Core
        Rulebook module then the details of the heroic event will be rolled for
        you. You will need to manually add favors, money etc that are described
        in the heoric event. If you don't have the Core Rulebook module, you
        will need to work with your GM to decide what the Heroic Events are.
        Update the descriptions and make any character adjustments (you can do
        this later).</p><p>You will also have a "Squired" History event added
        with the appropriate Glory.<br></p><p>You can now move on to
        @UUID[Compendium.Pendragon.instructions.JournalEntry.6oeGiTDZUL8cyL0t.JournalEntryPage.7o0M4NejqHstMwKR]{Heir}.</p>
    video:
      controls: true
      volume: 0.5
    src: null
    system: {}
    ownership:
      default: -1
    flags: {}
    _stats:
      duplicateSource: null
      coreVersion: '14.364'
      systemId: Pendragon
      systemVersion: 12.1.16
      createdTime: 1781499248994
      modifiedTime: 1781499248994
      lastModifiedBy: pendragonBuilder
      exportSource: null
    category: null
    _key: '!journal.pages!6oeGiTDZUL8cyL0t.HnijTDYLb3oC6DDO'
  - sort: 550000
    name: Culture
    type: text
    _id: xZ8SozzjMIJHKhlu
    title:
      show: true
      level: 2
    image: {}
    text:
      format: 1
      content: >-
        <p>The first job is to select your Culture (this will never be random).
        The list is pulled from all the cultures in the World or the
        Compendia.</p><p>This will add the Culture to the character sheet (you
        can see it in the
        @UUID[Compendium.Pendragon.instructions.JournalEntry.b5d7Ha8LOeLSNvul.JournalEntryPage.jLkjoTOmE5GIIuJW]{Bio
        Tab}) which in turn adds dice rolls and bonuses to stats and skill
        bonuses.</p><p><br></p><p>You can now move on to
        @UUID[Compendium.Pendragon.instructions.JournalEntry.6oeGiTDZUL8cyL0t.JournalEntryPage.ABAdWwribzZNPL5i]{Homeland}</p><p><br></p>
    video:
      controls: true
      volume: 0.5
    src: null
    system: {}
    ownership:
      default: -1
    flags: {}
    _stats:
      duplicateSource: null
      coreVersion: '14.364'
      systemId: Pendragon
      systemVersion: 12.1.16
      createdTime: 1781499248999
      modifiedTime: 1781499248999
      lastModifiedBy: pendragonBuilder
      exportSource: null
    category: null
    _key: '!journal.pages!6oeGiTDZUL8cyL0t.xZ8SozzjMIJHKhlu'
  - sort: 599610
    name: Characteristics
    type: text
    _id: tqwKyfDuiBYKRj9C
    title:
      show: true
      level: 2
    image: {}
    text:
      format: 1
      content: >-
        <p>What happens now will depend on the @UUID[.mW0ixUw2wxOyHzq1] you
        chose earlier.</p><p><br></p><p>If you selected
        <strong>Random</strong>then your statistics base values will be rolled
        for you and there's nothing for you to do. The results will be shown in
        a chat message.</p><p><br></p><p>If you chose
        <strong>Constructed</strong> then you will get a dialog box where you
        get to set your characteristics. The default is ten points in each stat
        and you can increase and decrease them in the range 8-15.</p><p>Any
        bonuses based on Culture are shown in parenthesis.</p><p>When you stats
        total 60 points the "Spend Points" button changes to
        "Confirm".</p><p><br></p><p>Once you have selected/rolled your Stats
        your base skill scores will be updated along with any secondary stats
        (Hit Points, Damage etc)</p><p><br></p><p>You can now move to
        @UUID[Compendium.Pendragon.instructions.JournalEntry.6oeGiTDZUL8cyL0t.JournalEntryPage.gW4bn11r6nKXuVy6]{Traits}</p>
    video:
      controls: true
      volume: 0.5
    src: null
    system: {}
    ownership:
      default: -1
    flags: {}
    _stats:
      duplicateSource: null
      coreVersion: '14.364'
      systemId: Pendragon
      systemVersion: 12.1.16
      createdTime: 1781499249006
      modifiedTime: 1781499249006
      lastModifiedBy: pendragonBuilder
      exportSource: null
    category: null
    _key: '!journal.pages!6oeGiTDZUL8cyL0t.tqwKyfDuiBYKRj9C'
  - sort: 596875
    name: Religion
    type: text
    _id: HB1h30D56RP4wuTm
    title:
      show: true
      level: 2
    image: {}
    text:
      format: 1
      content: >-
        <p>What happens next depends on what you selected <span
        style="font-family:Roboto, sans-serif">in the @UUID[.mW0ixUw2wxOyHzq1]
        step.</span></p><p><br></p><p>If you chose <strong>Random</strong> then
        your religion is selected randomly from the Religion table. It will also
        roll the dice for the starting values of the religious
        passions.</p><p><br></p><p>If you chose <strong>Constructed</strong>
        then you are presented with a list of all the religions in World or the
        Compendia and you select one. The starting values of the relgious
        passions are set</p><p><br></p><p>You can now move on to
        @UUID[Compendium.Pendragon.instructions.JournalEntry.6oeGiTDZUL8cyL0t.JournalEntryPage.jHIhVhlcviAXV75R]{Leige
        Lord}.</p>
    video:
      controls: true
      volume: 0.5
    src: null
    system: {}
    ownership:
      default: -1
    flags: {}
    _stats:
      duplicateSource: null
      coreVersion: '14.364'
      systemId: Pendragon
      systemVersion: 12.1.16
      createdTime: 1781499249013
      modifiedTime: 1781499249013
      lastModifiedBy: pendragonBuilder
      exportSource: null
    category: null
    _key: '!journal.pages!6oeGiTDZUL8cyL0t.HB1h30D56RP4wuTm'
  - sort: 1000000
    name: Traits
    type: text
    _id: gW4bn11r6nKXuVy6
    title:
      show: true
      level: 2
    image: {}
    text:
      format: 1
      content: >-
        <p>Again what happens next depends on what you selected <span
        style="font-family:Roboto, sans-serif">in the @UUID[.mW0ixUw2wxOyHzq1]
        step.</span></p><p><br></p><p>If you chose <strong>Random</strong> then
        your starting trait values generated randomly based on the religion. A
        chat message will show you the results.</p><p><br></p><p>If you chose
        <strong>Constructed</strong> you select a single trait to start at 16
        and then you are asked whether to set the trait or the opposing trait to
        16. After this you get a list of the other traits and their starting
        values which you can alter by up to 6 points in
        total.</p><p><br></p><p>You can now move on to
        @UUID[Compendium.Pendragon.instructions.JournalEntry.6oeGiTDZUL8cyL0t.JournalEntryPage.NQgc7KYZ79egJSCI]{Passions}</p>
    video:
      controls: true
      volume: 0.5
    src: null
    system: {}
    ownership:
      default: -1
    flags: {}
    _stats:
      duplicateSource: null
      coreVersion: '14.364'
      systemId: Pendragon
      systemVersion: 12.1.16
      createdTime: 1781499249020
      modifiedTime: 1781499249020
      lastModifiedBy: pendragonBuilder
      exportSource: null
    category: null
    _key: '!journal.pages!6oeGiTDZUL8cyL0t.gW4bn11r6nKXuVy6'
  - sort: 1100000
    name: Passions
    type: text
    _id: NQgc7KYZ79egJSCI
    title:
      show: true
      level: 2
    image: {}
    text:
      format: 1
      content: >-
        <p>Irrespective of whether you chose <strong>Random </strong>or
        <strong>Constructed </strong>you now pick your starting Class (usually
        Squire). This is drawn up from all the classes in the World or the
        Compendia which are flagged as "Starting" classes. If there aren't any
        starting classes you will see the full list of classes
        available.</p><p><br></p><p>If you chose <strong>Random </strong>your
        starting passions are rolled for you based on your class (there is a
        chat message showing the results) and then you are presented with a list
        of passions and a random number of additional points to
        spend.</p><p><br></p><p>If you chose <strong>Constructed</strong> then
        the starting passion values are set by your class and you are given a
        fixed number of additional points to spend.</p><p><br></p><p>Please note
        that resetting this step will also reset the Class.</p><p>Please also
        note that starting equipments isn't added at this
        stage.</p><p><br></p><p>Your character's passion score are updated and
        you can move on to
        @UUID[Compendium.Pendragon.instructions.JournalEntry.6oeGiTDZUL8cyL0t.JournalEntryPage.QEBfDMd7Zjx34BlL]{Parent
        Passion}.</p>
