    text:
      format: 1
      content: >-
        <p>Roll Tables have been customised with a tick box on the Summary Tab
        for "Roll Modifier".<br /><br />Ticking this box will, when you click
        the Draw Result, compare the results ranges to do the dice roll formula
        and if they don't match will allow you to add a modifer,</p><p>For
        example if the results are in the range 1-15, but the formula is 2D6 it
        will let you enter a modifer in the range -1 to 3.  Any numbers outside
        this range will be changed to be at the bottom/top of the range (in this
        example anything below -1 becomes -1 and anything above 3 becomes 3).<br
        /><br />If there is only one possible modifier (e.g. -1 to -1) it will
        automatically apply the modifier.</p><p></p><p>This is for cases, such
        as Tournament Prizes where the basic roll is 1D20 but you can add a
        modifier of up to 5.</p>
