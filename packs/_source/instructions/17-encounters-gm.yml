    title:
      show: true
      level: 1
    image: {}
    text:
      format: 1
      content: >-
        <p>An Encounter is an Actor Type and part of the Battle set up. 
        Generally this should not be shared with the players.</p><p></p><p>First
        give the Encounter a name and a short description.  These will be
        visible to the players in the Battle Cards.  This information goes in
        the top (green/blue part of the card).</p><p>There are found icons on
        the green/blue section:</p><p>A scroll - this will show/hide a notes
        section.  Any notes entered here aren't visible to players from the
        Battle Card.</p><p>A lock - double click to lock/unlock the Encounter
        Sheet</p><p>Crossed Swords - if you're run this encounter in a Battle
        and don't want it to be run again double click the swords to mark the
        encounter as 'used'.  This will put a line through the name.  It doesn't
        prevent the encounte being run again - it is just a visual
        cue.</p><p>The certificate is used to toggle the Encounter between an
        Encounter and an Opportunity.  Again the difference is just visual (a
        blue section at the top rather than green, and a different label on the
        Battle Card). </p><p></p><p>The enter the Morale Loss for the Encounter
        and the number of opponents per Player Knight.<br /></p><p>You can add
        up to Four NPCs to the Encolunter - these will be displayed in separate
        sections below the Morale Loss.</p><p>There are four "icons" you can
        click on in each NPC section:</p><p>Eye - click on this to show an NPC
        summary (you can't edit the NPC - you'll need to do that in the original
        NPC sheet).  Clicking on the eye again will hide the NPC section.<br
        />+1 / +3 / +5 clicking on any of these will add the relevant number of
        NPC tokens to the active scene.  </p><p></p><p>Finally the last entry at
        the bottom of the sheet is the Minimum Morale value for the
        Encounter.<br /><br />These Encounters will be added to Battle
        Cards.</p><p><br />Remember it is possible to set all Encounters in the
        Game World to unused from the GM tools menu
        @UUID[Compendium.Pendragon.instructions.JournalEntry.CJhCwQigLrJhBBQF.JournalEntryPage.6aH2K7tpoqzfcCf9]{Reset
        Encounters}</p>
