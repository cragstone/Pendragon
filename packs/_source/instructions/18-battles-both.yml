  - sort: 200000
    name: Battle Scene
    type: text
    _id: XfCh4hPHxKWLfuWZ
    system: {}
    title:
      show: true
      level: 1
    image: {}
    text:
      format: 1
      content: >-
        <p>The core system includes a scene for battles - but you are free to
        create your own.</p><p></p><p>This scene is a table - the right hand
        side is clear and is for character/NPC sheets, party sheets, encounter
        and battle cards etc.</p><p><br />The left hand side is a parchment with
        a round map of the battle field, divided in to sections by dotted red
        lines.<br /></p><p>The top section is the enemy's "rear" where some
        encounters may be fought.</p><p>The next (largest) section is the "In
        the Field" area.</p><p>The  next (empty) section is the "Retreat to the
        Rear" area where Conroi's can recover morale, get healed etc</p><p>And
        the bottom section is "Behind the lines"</p><p></p><p>There is no
        functionality associated with the sections, they are merely to help show
        where the Player Characters are.</p><p></p><p>Adiing tokens to the scene
        with the relevant icons on the
        @UUID[Compendium.Pendragon.instructions.JournalEntry.IVQ9dYdmIjkJdAZa]{17)
        Encounters (GM)} sheet will place the enemy tokens in the "In the Field
        " area.</p>
