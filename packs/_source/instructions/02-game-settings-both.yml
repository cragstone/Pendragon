  - sort: 200000
    name: Automate and Fumble XP (GM only)
    type: text
    _id: WyR6m6LOKiF3HVmB
    title:
      show: true
      level: 1
    image: {}
    text:
      format: 1
      content: >-
        <p>There are two checkboxes.</p><p><strong>Automate XP</strong></p><p>If
        this option is turned on then any skill, trait or passion will get an XP
        check added whenever a Critical, Success or Fumble is
        rolled.</p><p>Traits that are fumbled award the XP check to the opposing
        trait.</p><p>When using a weapon the XP check is applied to the relevant
        skill.</p><p>You can still manually check and uncheck the XP boxes on
        individual skills etc.</p><p>An Inquiry Roll, Dodge or Evade combat
        action will not automatically add an XP
        check.</p><p></p><p><strong>Fumble XP</strong></p><p>If turned off then
        Automate XP All will not be granted in the event of a Fumble. If
        Automate XP All is turned off then this will have no
        effect.</p><p></p><table><tbody><tr><td><p></p></td><td><p
        style="text-align:center"><strong>Automate XP On</strong></p></td><td><p
        style="text-align:center"><strong>Automate XP
        Off</strong></p></td></tr><tr><td><p><strong>Fumble XP
        On</strong></p></td><td><p style="text-align:center">XP checks added
        automatically for Critical, Success &amp; Fumble</p></td><td><p
        style="text-align:center">Add XP checks
        manually</p></td></tr><tr><td><p><strong>Fumble XP
        Off</strong></p></td><td><p style="text-align:center">XP checks added
        automatically for Critical  &amp; Success</p></td><td><p
        style="text-align:center">Add XP checks
        manually</p></td></tr></tbody></table>
    video:
      controls: true
      volume: 0.5
