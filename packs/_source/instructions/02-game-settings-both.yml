  - sort: 800000
    name: Show Party Details
    type: text
    _id: BGPNYU1lP7NF3mmV
    system: {}
    title:
      show: true
      level: 1
    image: {}
    text:
      format: 1
      content: >-
        <p>The new actor type allows several characters to be added allowing for
        an easy view of the party.</p><p></p><p>For each character you will see
        their character image, a HP Bar showing how healthy they are along with
        the current and max HP values, and a list of Traits, Passions and Skills
        with a score of 16+</p><p></p><p>This option when ticked (the default)
        allows players to see all of the above. When unticked they will still
        see the character image and HP bar but not the HP values or the list of
        Traits, Passions and Skills.</p>
    video:
