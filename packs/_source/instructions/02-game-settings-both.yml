  - sort: 400000
    name: Critical Bonus Adjustment (GM only)
    type: text
    _id: xvSMxXzJeG1DEqE2
    title:
      show: true
      level: 1
    image: {}
    text:
      format: 1
      content: >-
        <p>When an opposed or combat roll is made and all parties have a
        critical bonus due to scores of 20+ then all parties bonuses are reduced
        by the lowest bonus.<br /></p><p>For example, two knights with Sword
        Skills of 20 (+3) and 20 (+5) would see their Skills reduced to 20 and
        20 (+2), respectively.  This rule has the effect of putting
        equally-proficient characters on a more even footing with fewer critical
        successes overall.</p>
    video:
      controls: true
      volume: 0.5
    src: null
