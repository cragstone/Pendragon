  - sort: 300000
    name: SHIFT key (both)
    type: text
    _id: 8JRDCc5CePLRMFxN
    title:
      show: true
      level: 1
    image: {}
    text:
      format: 1
      content: >-
        <p>By default when clicking a Check Roll (skill, trait etc) a dialogue
        box opens asking for things like modifiers. Pressing SHIFT and clicking
        stops this box from appearing and uses no modifiers (unless set by
        something else in the game).</p><p>Toggling this option on changes this
        behaviour so that the default is that no box appears, and using SHIFT +
        click causes the box to appear.</p><p>This is set separately by the
        person playing the game and can be different for each
        player.</p><p></p><p>This <strong>does not</strong> apply to Horse
        damage where the SHIFT key is used to apply charging damage.</p>
    video:
      controls: true
      volume: 0.5
    src: null
    system: {}
