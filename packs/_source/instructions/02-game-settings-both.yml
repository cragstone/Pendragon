  - sort: 900000
    name: When Creating NPC (GM)
    type: text
    _id: EG80uuwz8hOXkuUN
    system: {}
    title:
      show: true
      level: 1
    image: {}
    text:
      format: 1
      content: >-
        <p>When you drop an NPC on to the canvas that has rollable stats,
        skills, passions or traits (see NPC) you can chose to either Roll the
        Stats or Ignore them.<br /><br />This setting lets you set a default
        option:</p><p>Ask - you will always be asked if there are rollable
        stats</p><p>Roll - you will always roll the stats (which will also reset
        HP and other derived stats to the new calculated values)</p><p>Ignore -
        never roll the stats etc</p>
